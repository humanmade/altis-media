name: CI

on:
  push:
    branches:
      - master
      - main
      - 'v*-branch'
  pull_request:
    branches:
      - master
      - main
      - 'v*-branch'

jobs:
  ci:
    # TODO: re-pin to module-ci.yml@master (or the #1065 merge SHA) once
    # humanmade/altis-dev-tools#1065 lands. The `module-config` input only
    # exists on that branch.
    uses: humanmade/altis-dev-tools/.github/workflows/module-ci.yml@1cfc5819a12355cc7d8071a4b7145fe3f162f985
    with:
      altis-package: altis/media
      module-config: '{"media":{"private-media":true}}'
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
